<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SuDostava – Brza dostava omiljenih jela</title>
<meta name="description" content="SuDostava – Naruči iz najboljh restorana. Besplatna dostava. Plaćanje gotovinom ili karticom pri dostavi." />
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--or:#F5821F;--gr:#4CAF50;--dk:#1A1A1A;--bg:#F9F6F1;--wh:#fff;}
body{font-family:'Inter',Arial,sans-serif;background:#fff;color:var(--dk);}
.wrap{background:#fff;min-height:100vh;}
.page{display:none;}.page.active{display:block;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:10px 32px;background:#fff;border-bottom:1.5px solid #eee;gap:16px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo-img{width:110px;height:auto;object-fit:contain;}
.nav-links{display:flex;gap:22px;align-items:center;}
.nav-links a{text-decoration:none;color:var(--dk);font-size:14px;font-weight:500;cursor:pointer;}
.nav-links a:hover{color:var(--or);}
.nav-right{display:flex;align-items:center;gap:12px;}
.free-badge{background:#E8F5E9;color:#2E7D32;font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;white-space:nowrap;}
.nav-btn{background:var(--or);color:#fff;border:none;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.nav-btn:hover{background:#e07010;}

/* HERO */
.hero{background:var(--bg);padding:60px 40px 50px;display:flex;align-items:center;gap:30px;}
.hero-text{flex:1;}
.free-delivery-banner{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--gr);border-radius:14px;padding:12px 20px;margin-bottom:24px;max-width:440px;}
.fdb-icon{font-size:28px;}
.fdb-text strong{display:block;font-size:15px;font-weight:800;color:#2E7D32;}
.fdb-text span{font-size:12px;color:#555;}
.hero h1{font-size:42px;font-weight:900;line-height:1.15;color:var(--dk);margin-bottom:14px;}
.hero h1 em{color:var(--or);font-style:normal;}
.hero p{font-size:16px;color:#555;line-height:1.65;margin-bottom:26px;max-width:460px;}
.search-bar{display:flex;background:#fff;border:2px solid #eee;border-radius:50px;overflow:hidden;max-width:460px;}
.search-bar input{flex:1;border:none;padding:13px 20px;font-size:14px;outline:none;background:transparent;color:var(--dk);}
.search-bar button{background:var(--or);color:#fff;border:none;padding:11px 24px;font-size:14px;font-weight:700;cursor:pointer;border-radius:0 48px 48px 0;}
.hero-img{flex:0 0 260px;display:flex;justify-content:center;}
.hero-visual{width:240px;background:#fff;border-radius:22px;border:2px solid #eee;padding:24px;text-align:center;}
.hero-visual .big-icon{font-size:64px;margin-bottom:10px;}
.hero-visual strong{font-size:16px;font-weight:800;color:var(--dk);}
.hero-visual p{font-size:12px;color:#888;margin-top:4px;}
.hero-pills{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;}
.pill-or{background:#FFF0E0;color:#b85f00;}
.pill-gr{background:#E8F5E9;color:#1b5e20;}
.pay-badges{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;}
.pay-badge{display:inline-flex;align-items:center;gap:6px;background:#f5f5f5;border-radius:8px;padding:6px 10px;font-size:11px;color:#555;font-weight:600;}

/* HERO MESSAGE CARD */
.hero-promo{flex:0 0 620px;display:flex;align-items:center;justify-content:center;}
.hero-message-card{width:100%;max-width:520px;min-height:300px;background:#fff;border:2px solid #eee;border-radius:22px;padding:34px 30px;display:flex;align-items:center;justify-content:center;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.06);}
.hero-message-card h2{font-size:42px;line-height:1.1;font-weight:900;color:var(--dk);}
.hero-message-card h2 span{color:var(--or);}
@media(max-width:1200px){.hero-promo{flex:0 0 420px;}.hero-message-card{max-width:360px;min-height:260px;}.hero-message-card h2{font-size:32px;}}
@media(max-width:900px){.hero-promo{display:none;}}

/* STEPS */
.section{padding:48px 40px;}
.section-title{font-size:24px;font-weight:900;margin-bottom:4px;}
.section-sub{font-size:14px;color:#777;margin-bottom:28px;}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.step-card{background:#fff;border:1.5px solid #eee;border-radius:18px;padding:28px 24px;position:relative;overflow:hidden;}
.step-num{position:absolute;top:14px;right:16px;font-size:52px;font-weight:900;color:var(--or);opacity:0.12;line-height:1;}
.step-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;}
.ic-or{background:#FFF0E0;}.ic-gr{background:#E8F5E9;}
.step-card h3{font-size:16px;font-weight:800;margin-bottom:6px;}
.step-card p{font-size:13px;color:#777;line-height:1.6;}

/* RESTAURANTS */
.rests{background:var(--bg);padding:48px 40px;}
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.rest-card{background:#fff;border-radius:18px;border:1.5px solid #eee;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.rest-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.08);}
.rest-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;}
.rest-info{padding:12px 14px;}
.rest-info h4{font-size:14px;font-weight:800;margin-bottom:5px;}
.rest-meta{display:flex;gap:8px;font-size:11px;color:#888;flex-wrap:wrap;}
.rest-rating{color:var(--or);font-weight:700;}
.tag{background:#f5f5f5;padding:2px 7px;border-radius:8px;font-size:10px;color:#555;}

/* PARTNER SECTION */
.partner-section{padding:48px 40px;background:#fff;}
.partner-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:700px;}
.partner-card{border-radius:18px;padding:32px;color:#fff;cursor:pointer;}
.partner-card.rest-p{background:var(--or);}
.partner-card.drv-p{background:var(--dk);}
.partner-card h3{font-size:20px;font-weight:900;margin-bottom:8px;}
.partner-card p{font-size:13px;opacity:.85;margin-bottom:18px;line-height:1.5;}
.partner-card button{background:#fff;border:none;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;}
.partner-card.rest-p button{color:var(--or);}
.partner-card.drv-p button{color:var(--dk);}

/* FOOTER */
footer{background:var(--dk);color:#fff;padding:40px;display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;}
footer h4{font-size:13px;font-weight:800;margin-bottom:12px;color:#fff;text-transform:uppercase;letter-spacing:.5px;}
footer p,footer a{font-size:13px;color:#aaa;text-decoration:none;display:block;margin-bottom:6px;cursor:pointer;}
footer a:hover{color:var(--or);}
.footer-logo{width:110px;margin-bottom:12px;filter:brightness(0) invert(1);opacity:.85;}

/* RESTAURANT PAGES */
.page-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:#fff;border-bottom:1.5px solid #eee;position:sticky;top:0;z-index:100;}
.page-logo{display:flex;align-items:center;gap:10px;}
.page-logo-img{width:80px;height:auto;}
.page-logo-info h4{font-size:14px;font-weight:800;margin:0;}
.page-logo-info p{font-size:11px;color:#888;margin:0;}
.back-btn{background:var(--or);color:#fff;border:none;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;}
.page-hero{background:var(--bg);padding:28px 32px 20px;display:flex;align-items:center;gap:20px;}
.page-hero-icon{font-size:56px;flex-shrink:0;}
.page-hero h1{font-size:28px;font-weight:900;margin-bottom:4px;}
.page-hero p{font-size:13px;color:#666;}
.page-hero .pay-info{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
.pay-pill{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid #eee;border-radius:10px;padding:4px 10px;font-size:11px;font-weight:600;}

/* MENU */
.menu-wrap{padding:24px 32px 140px;}
.menu-tabs{display:flex;gap:10px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
.mtab{background:#f5f5f5;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;color:#555;}
.mtab.active{background:var(--or);color:#fff;}
.menu-section-title{font-size:18px;font-weight:900;margin-bottom:16px;margin-top:28px;color:var(--dk);display:flex;align-items:center;gap:8px;}
.menu-section-title::before{content:'';display:block;width:4px;height:20px;background:var(--or);border-radius:3px;}
.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.food-item{background:#fff;border:1.5px solid #eee;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.food-photo{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;background:#fafafa;}
.food-body{padding:12px;flex:1;display:flex;flex-direction:column;}
.food-body h4{font-size:14px;font-weight:700;margin-bottom:4px;}
.food-body p{font-size:12px;color:#888;margin-bottom:10px;flex:1;line-height:1.5;}
.food-footer{display:flex;align-items:center;justify-content:space-between;}
.food-price{font-size:15px;font-weight:800;color:var(--or);}
.add-btn{background:var(--or);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.add-btn.added{background:var(--gr);}
.drink-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.drink-item{background:#fff;border:1.5px solid #eee;border-radius:14px;overflow:hidden;text-align:center;}
.drink-photo{height:90px;display:flex;align-items:center;justify-content:center;font-size:40px;background:#fafafa;}
.drink-body{padding:10px;}
.drink-body h4{font-size:13px;font-weight:700;margin-bottom:2px;}
.drink-body p{font-size:11px;color:#888;margin-bottom:8px;}
.drink-footer{display:flex;align-items:center;justify-content:space-between;}

/* CART BAR */
.cart-bar{position:sticky;bottom:0;background:var(--dk);color:#fff;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;gap:16px;z-index:50;}
.cart-info{display:flex;flex-direction:column;gap:2px;}
.cart-info .cart-items{font-size:13px;color:#aaa;}
.cart-info .cart-total{font-size:17px;font-weight:800;}
.cart-order-btn{background:var(--or);color:#fff;border:none;padding:12px 28px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;}

/* MODALS */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px;padding:32px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:22px;font-weight:900;margin-bottom:8px;}
.modal p{font-size:14px;color:#666;margin-bottom:20px;line-height:1.6;}
.modal input,.modal textarea,.modal select{width:100%;border:1.5px solid #ddd;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:12px;outline:none;font-family:inherit;color:var(--dk);}
.modal-btns{display:flex;gap:10px;margin-top:4px;}
.modal-submit{background:var(--or);color:#fff;border:none;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;flex:1;}
.modal-submit:hover{background:#e07010;}
.modal-cancel{background:#f5f5f5;color:#555;border:none;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;}

.toast{position:fixed;bottom:
